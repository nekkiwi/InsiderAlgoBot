name: Run InsiderAlgoBot Daily

on:
  schedule:
    - cron: '00 14 * * *'  # Every day at 14:00 UTC
  workflow_dispatch:      # Allows manual run from GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      # Secrets for your bot
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
      
      # Secrets for Google Drive access
      GOOGLE_SHEET_CREDS_JSON: ${{ secrets.GOOGLE_SHEET_CREDS_JSON }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alpaca-trade-api==3.2.0 --no-deps

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Download data from Google Drive
        env:
          # This configures rclone to access Google Drive using your service account
          RCLONE_CONFIG_GDRIVE_TYPE: drive
          RCLONE_CONFIG_GDRIVE_SCOPE: drive.readonly
          RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GOOGLE_SHEET_CREDS_JSON }}
          
          # The name of the file you want to download from your Google Drive folder
          # Make sure to change this to the actual name of your file
          FILE_NAME: 'your-large-file.dat' 
        run: |
          # Downloads the specified file from the Google Drive folder into the workflow's current directory
          rclone copy "gdrive,root_folder_id=${{ env.GDRIVE_FOLDER_ID }}:${{ env.FILE_NAME }}" .
          echo "Download of ${{ env.FILE_NAME }} complete."

      - name: Run bot
        run: |
          python run_bot.py
